<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catscope - Login</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <div id="header">Catscope</div>
    <div id="login-container">
        <form id="login-form">
            <h2>Authentication Required</h2>
            <div id="login-error"></div>
            <input type="password" id="login-password" placeholder="Password" autofocus>
            <button type="submit">Login</button>
        </form>
    </div>
    <script>
    (function() {
        "use strict";
        document.getElementById("login-form").addEventListener("submit", function(e) {
            e.preventDefault();
            var pw = document.getElementById("login-password").value;
            if (!pw) return;
            var encoder = new TextEncoder();
            crypto.subtle.digest("SHA-256", encoder.encode(pw)).then(function(buf) {
                var arr = new Uint8Array(buf);
                var hex = "";
                for (var i = 0; i < arr.length; i++) {
                    hex += ("0" + arr[i].toString(16)).slice(-2);
                }
                return fetch("/login", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({passwordHash: hex})
                });
            }).then(function(r) {
                if (r.ok) {
                    window.location.href = "/";
                } else {
                    var errEl = document.getElementById("login-error");
                    errEl.textContent = "Invalid password";
                    errEl.style.display = "block";
                }
            });
        });
    })();
    </script>
</body>
</html>
