[package]
name = "catscope"
version = "2.1.0"
edition = "2024"
authors = ["Dev Team <dev@example.com>"]
description = "Web-based file browser for remote servers"
license = "MIT"
repository = "https://github.com/example/catscope"

[dependencies]
tokio = { version = "1.37", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
axum = "0.7"
tower-http = { version = "0.5", features = ["fs", "cors"] }
notify = "6.1"
tracing = "0.1"

[dev-dependencies]
tempfile = "3.10"
assert_cmd = "2.0"
predicates = "3.1"

[profile.release]
opt-level = 3
lto = true
strip = true
codegen-units = 1

[[bin]]
name = "catscope"
path = "src/main.rs"
