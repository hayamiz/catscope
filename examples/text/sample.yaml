apiVersion: apps/v1
kind: Deployment
metadata:
  name: catscope
  namespace: devtools
  labels:
    app: catscope
    version: v2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catscope
  template:
    metadata:
      labels:
        app: catscope
        version: v2
    spec:
      containers:
        - name: catscope
          image: ghcr.io/example/catscope:2.1.0
          ports:
            - containerPort: 4567
              protocol: TCP
          env:
            - name: CATSCOPE_HOST
              value: "0.0.0.0"
            - name: CATSCOPE_PORT
              value: "4567"
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 4567
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: workspace
              mountPath: /data
              readOnly: true
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: workspace-pvc
